backend_url: "http://localhost:8000"

retrieval:
  top_k: 8
  score_threshold: 0.0

evaluation:
  # How many top results to check for hit rate / recall
  hit_rate_k: [1, 3, 5, 8]

# Models to compare in a single run. Each is passed as the `model` override
# to POST /api/chat (routes through Ollama regardless of the backend's
# configured default). Add/remove entries here to compare different models
# without touching the script.
models:
  - name: "llama3.1:8b-instruct-q4_K_M"
    label: "Llama 3.1 8B Instruct (Q4_K_M)"
  - name: "qwen3.5:4b-q4_K_M"
    label: "Qwen 3.5 4B (Q4_K_M)"

# LLM-as-a-Judge configuration for RAGAS-style answer-quality metrics
# (faithfulness, answer relevancy, context precision, context recall).
# The judge is a cloud model (Claude) so it is independent from the models
# being evaluated - this is Claude API money, not Ollama, hence the budget.
judge:
  provider: "anthropic"
  model: "claude-haiku-4-5"
  # Hard budget ceiling in USD. The script stops issuing further judge calls
  # once projected spend would exceed this and reports how many
  # question/model pairs were judged vs. skipped.
  budget_usd: 8.0
  # Pricing per 1M tokens - used only for local budget bookkeeping, update
  # if Anthropic pricing changes. See shared/models.md in the claude-api skill.
  price_input_per_mtok: 1.00
  price_output_per_mtok: 5.00
  # How many dataset questions get LLM-judged. IMPORTANT: this number is
  # PER MODEL, not split across models - the script samples this many
  # question IDs ONCE, then judges the answer from EVERY model in `models:`
  # for that SAME set of questions (this is what keeps the comparison
  # controlled: both models are graded on identical questions). So
  # ragas_sample_size: 500 with 2 models means 500 answer-quality judgments
  # for Llama AND 500 for Qwen (1,000 total answer judgments), plus 500
  # shared context-quality judgments (context is identical across models,
  # so it's judged once, not once per model) = 1,500 judge calls total.
  # null = no cap, rely on the budget tracker alone (not recommended for a
  # dataset this large - retrieval metrics still run on the full dataset
  # for free either way).
  #
  # dataset.json has 1,816 questions (imported from the prior evaluation
  # project - see docs/evaluation/import_legacy_dataset.py). 500 per model
  # was chosen because it's 2.5x the 200-sample runs from the previous
  # evaluation (more statistical confidence), and the resulting 1,500 judge
  # calls cost roughly $3-5 with Claude Haiku 4.5 pricing - comfortably
  # inside the $8 ceiling with headroom for the hard budget stop to never
  # trigger mid-run. See THESIS_NOTES.md Sec. 1 for the write-up of this
  # sampling decision for BAB III.
  ragas_sample_size: 500
  # Random seed for sampling, so repeated runs with the same sample_size
  # judge the same subset of questions (reproducibility).
  sample_seed: 42

output:
  dir: "results"
  # auto-generated filename with timestamp if not specified
  filename: null
